<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arsip Eksistensi x RPG Kehidupan</title>
    <style>
        body {
            background-color: #08080c;
            color: #f0f0f5;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            padding: 20px 0;
            box-sizing: border-box;
        }
        #app { width: 95%; max-width: 800px; padding: 10px; box-sizing: border-box; }
        .pulse { font-size: 1.1rem; letter-spacing: 3px; animation: pulse 2.5s infinite; cursor: pointer; text-align: center; }
        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
        .timeline-text { font-size: 1.8rem; font-weight: bold; line-height: 1.6; cursor: pointer; text-align: center; }
        .card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; padding: 30px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5); backdrop-filter: blur(8px); animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .breadcrumbs { font-size: 0.75rem; color: #888; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .breadcrumbs span { color: #00ffcc; }
        h1 { font-size: 1.8rem; margin: 0 0 10px 0; color: #44aaff; }
        .subtitle { font-size: 0.9rem; color: #ffb300; margin: 0 0 15px 0; text-transform: uppercase; letter-spacing: 1.5px; }
        p { line-height: 1.6; color: #ccc; font-size: 0.95rem; margin-bottom: 25px; }
        .btn-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; margin-top: 20px; }
        .btn { background: rgba(255, 255, 255, 0.02); color: #e0e0e5; border: 1px solid rgba(255, 255, 255, 0.15); padding: 14px 16px; font-family: inherit; font-size: 0.85rem; text-align: left; border-radius: 6px; cursor: pointer; transition: all 0.25s ease; display: flex; align-items: center; justify-content: space-between; }
        .btn:hover { background: rgba(0, 255, 204, 0.08); border-color: #00ffcc; color: #fff; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0, 255, 204, 0.15); }
        .btn::after { content: "➔"; font-size: 0.8rem; opacity: 0.5; transition: transform 0.25s; }
        .btn:hover::after { transform: translateX(4px); opacity: 1; }
        .nav-footer { display: flex; gap: 15px; margin-top: 30px; border-top: 1px solid rgba(255, 255, 255, 0.08); padding-top: 20px; }
        .btn-control { flex: 1; padding: 12px; font-family: inherit; font-size: 0.9rem; border-radius: 6px; cursor: pointer; text-align: center; transition: all 0.25s; }
        .btn-back { background: rgba(255, 50, 50, 0.05); color: #ff5555; border: 1px solid rgba(255, 50, 50, 0.25); }
        .btn-back:hover { background: rgba(255, 50, 50, 0.15); border-color: #ff3333; }
        .btn-home { background: rgba(255, 255, 255, 0.05); color: #fff; border: 1px solid rgba(255, 255, 255, 0.2); }
        .btn-home:hover { background: rgba(255, 255, 255, 0.15); }
        @media (max-width: 600px) { .btn-grid { grid-template-columns: 1fr; } .nav-footer { flex-direction: column; } }
    </style>
</head>
<body>
    <div id="app">
        <div id="intro-container" class="pulse"> [ KLIK LAYAR UNTUK MEMULAI KOSMOS ] </div>
    </div>

    <!-- MENGGUNAKAN TYPE=MODULE SUPAYA BISA IMPORT DATA SECARA EFISIEN -->
    <script type="module">
        import { treeData } from './data.js';

        const app = document.getElementById('app');
        let introStep = 0;

        window.nextIntroStep = function() {
            introStep++;
            if (introStep === 1) {
                app.innerHTML = `<div class="timeline-text" style="color: #ff3333; font-size: 2.2rem;" onclick="nextIntroStep()">* BIG BANG *</div>`;
            } else if (introStep === 2) {
                app.innerHTML = `<div class="timeline-text" onclick="nextIntroStep()"><span style="color: #44aaff;">Membentuk Bumi...</span><br><span style="font-size: 1rem; color: #888;">Time-lapse: 4,5 Miliar Tahun Berlalu</span></div>`;
            } else if (introStep === 3) {
                app.innerHTML = `<div class="timeline-text" onclick="nextIntroStep()"><span style="color: #00ffcc;">19 AGUSTUS 2008</span><br><span style="font-size: 1.4rem; color: #fff;">Perjalanan Jiwa Dimulai.</span></div>`;
            } else {
                renderState("root");
            }
        };

        // Daftarkan event listener klik awal pada window
        document.getElementById('intro-container').addEventListener('click', window.nextIntroStep);

        window.renderState = function(stateId) {
            const state = treeData[stateId];
            if (!state) return;

            let choicesHtml = "";
            if (state.choices && state.choices.length > 0) {
                state.choices.forEach(choice => {
                    choicesHtml += `<button class="btn" onclick="renderState('${choice.target}')">${choice.text}</button>`;
                });
            } else {
                choicesHtml = `<p style="color: #888; font-style: italic; text-align: center; width: 100%;">-- Desain Karakter Selesai. Siap Berpetualang di Realitas Semesta. --</p>`;
            }

            let controlButtonsHtml = "";
            if (!state.isRoot) {
                controlButtonsHtml += `<button class="btn-control btn-back" onclick="renderState('${state.parent}')">⬅ KEMBALI SEBELUMNYA</button>`;
                controlButtonsHtml += `<button class="btn-control btn-home" onclick="renderState('root')">🏠 KE HALAMAN UTAMA</button>`;
            }

            app.innerHTML = `
                <div class="card">
                    <div class="breadcrumbs">Jalur: <span>${state.pathString}</span></div>
                    <div class="subtitle">// ${state.subtitle}</div>
                    <h1>${state.title}</h1>
                    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.08); margin-bottom: 20px;">
                    <p>${state.description}</p>
                    <div class="btn-grid">${choicesHtml}</div>
                    ${controlButtonsHtml ? `<div class="nav-footer">${controlButtonsHtml}</div>` : ''}
                </div>
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
    </script>
</body>
</html>
